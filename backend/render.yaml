# Generic Render blueprint (no GitLab-CI lock-in). Deploys the backend/ folder.
# Move off the free plan once live scoring has real traffic (TECH_DOCS §5 graduation trigger).
services:
  - type: web
    name: stackoptimizer-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
